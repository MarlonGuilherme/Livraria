
default: &default
  adapter: postgresql
  encoding: unicode
  
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  database: biblioteca_development

test:
  <<: *default
  database: biblioteca_test

production:
  primary: &primary_production
    <<: *default
    database: biblioteca_production
    username: guilherme
    password: Guilherme123!@#
  cache:
    <<: *primary_production
    database: biblioteca_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: biblioteca_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: biblioteca_production_cable
    migrations_paths: db/cable_migrate
